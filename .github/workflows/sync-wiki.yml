name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/**"
      - "scripts/wiki_manifest.json"
      - "scripts/sync_docs_to_wiki.py"
      - ".github/workflows/sync-wiki.yml"

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Clone wiki repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" .wiki-tmp || {
            echo "::error::Failed to clone the wiki repository. Enable the repository wiki in GitHub and create an initial Home page before running this workflow."
            exit 1
          }

      - name: Sync docs to wiki
        run: |
          python scripts/sync_docs_to_wiki.py \
            --wiki-dir .wiki-tmp \
            --repo-url "https://github.com/${{ github.repository }}" \
            --default-branch main

      - name: Commit and push wiki changes
        run: |
          cd .wiki-tmp
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "docs(wiki): sync from repo docs"
          git push origin HEAD:master
